name: Next js app

on:
 push:
   branches: [ main]

jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v7.0.0

        - name: Setup Node.js
          uses: actions/setup-node@v6.4.0
          with:
            node-version: 23.7.0
            cache: 'npm'

        - name: Install Dependencies
          run: npm install
        
        - name: Build app
          run: npm run build

        - name: Build on Artifacts
          uses: actions/upload-artifact@v4
          with:
            name: Next js build
            path: |
             .next/
             public/
             package.json
             package-lock.json
            retention-days: 7
